<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="דגלים" />
  <meta name="theme-color" content="#1a237e" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <title>משחק זכרון דגלים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #1a237e;
      --sky:    #1565c0;
      --green:  #2e7d32;
      --red:    #c62828;
      --amber:  #e65100;
      --gold:   #f9a825;
      --bg:     #e8eaf6;
      --white:  #ffffff;
      --radius: 18px;
    }

    html[lang="he"] body { font-family: 'Heebo', sans-serif; }
    html[lang="en"] body { font-family: 'Nunito', sans-serif; }
    body {
      font-family: 'Heebo', 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: #1a1a2e;
    }

    /* ── Screens ── */
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ════════════════════════════════
       LANGUAGE SCREEN
    ════════════════════════════════ */
    #screen-lang {
      background: linear-gradient(160deg, #1a237e 0%, #283593 55%, #1565c0 100%);
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--white);
    }
    .lang-box {
      display: flex; flex-direction: column; align-items: center; gap: 28px;
      padding: 40px 24px;
    }
    .lang-globe { font-size: 80px; }
    .lang-title {
      font-size: 1.6rem; font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .lang-buttons { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .btn-lang {
      min-width: 170px; min-height: 84px;
      font-size: 1.5rem; font-weight: 700;
      border: none; border-radius: 20px; cursor: pointer;
      color: var(--white);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-lang:first-child {
      background: linear-gradient(135deg, #1565c0, #1e88e5);
      box-shadow: 0 6px 20px rgba(21,101,192,0.5);
    }
    .btn-lang:last-child {
      background: linear-gradient(135deg, #2e7d32, #43a047);
      box-shadow: 0 6px 20px rgba(46,125,50,0.5);
    }
    .btn-lang:active { transform: scale(0.95); }

    /* ════════════════════════════════
       WELCOME SCREEN
    ════════════════════════════════ */
    #screen-welcome {
      background: linear-gradient(160deg, #1a237e 0%, #283593 55%, #1565c0 100%);
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--white);
      padding: 32px 20px;
      gap: 20px;
    }
    .welcome-emoji { font-size: 80px; line-height: 1; }
    .welcome-title {
      font-size: 2rem; font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .welcome-sub {
      font-size: 1.15rem; opacity: 0.9; max-width: 340px;
    }
    .btn-start {
      margin-top: 12px;
      padding: 18px 48px; font-size: 1.4rem; font-weight: 800;
      border: none; border-radius: 60px; cursor: pointer;
      background: linear-gradient(135deg, var(--gold), #fbc02d);
      color: var(--blue);
      box-shadow: 0 6px 24px rgba(249,168,37,0.5);
      transition: transform 0.15s;
    }
    .btn-start:active { transform: scale(0.95); }
    .btn-change-lang {
      margin-top: 16px; padding: 10px 20px;
      font-size: 0.95rem; font-weight: 600;
      background: rgba(255,255,255,0.15); color: var(--white);
      border: 1px solid rgba(255,255,255,0.3); border-radius: 30px;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-change-lang:hover { background: rgba(255,255,255,0.25); }

    /* ════════════════════════════════
       WARNING BANNER
    ════════════════════════════════ */
    .voice-warning {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      background: #ff6f00; color: var(--white); text-align: center;
      padding: 10px 16px; font-size: 0.9rem; font-weight: 600;
      display: none;
    }
    .voice-warning.show { display: block; }

    /* ════════════════════════════════
       STUDY SCREEN
    ════════════════════════════════ */
    #screen-study {
      background: var(--bg); padding-bottom: 32px;
    }
    .study-header {
      background: linear-gradient(135deg, var(--blue), var(--sky));
      color: var(--white); padding: 18px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .study-header h2 { font-size: 1.25rem; font-weight: 700; }
    .round-badge {
      background: rgba(255,255,255,0.2); padding: 4px 14px;
      border-radius: 20px; font-size: 0.9rem; font-weight: 600;
    }
    .study-grid {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 16px; padding: 20px 12px;
    }
    .study-card {
      width: 200px; background: var(--white);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .study-card-flag {
      width: 100%; height: 120px; object-fit: cover;
      border-bottom: 3px solid var(--gold);
    }
    .study-card-body { padding: 10px 12px; }
    .study-card-name {
      display: flex; align-items: center; gap: 8px;
      font-size: 1.05rem; font-weight: 700; margin-bottom: 8px;
    }
    .btn-hear-name {
      flex-shrink: 0; width: 36px; height: 36px;
      border: none; border-radius: 50%; cursor: pointer;
      background: var(--sky); color: var(--white);
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
    }
    .fact-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 0; font-size: 0.82rem;
      border-top: 1px solid #eee;
    }
    .fact-label { font-weight: 600; white-space: nowrap; }
    .fact-value { flex: 1; }
    .btn-hear-fact {
      flex-shrink: 0; width: 30px; height: 30px;
      border: none; border-radius: 50%; cursor: pointer;
      background: var(--sky); color: var(--white);
      font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
    }
    .btn-hear-fact:active, .btn-hear-name:active { transform: scale(0.9); }

    .btn-quiz {
      display: block; margin: 20px auto 0;
      padding: 16px 44px; font-size: 1.25rem; font-weight: 800;
      border: none; border-radius: 50px; cursor: pointer;
      background: linear-gradient(135deg, var(--green), #43a047);
      color: var(--white);
      box-shadow: 0 6px 20px rgba(46,125,50,0.4);
      transition: transform 0.15s;
    }
    .btn-quiz:active { transform: scale(0.95); }

    /* ════════════════════════════════
       QUIZ SCREEN
    ════════════════════════════════ */
    #screen-quiz { background: var(--bg); }
    .quiz-header {
      background: linear-gradient(135deg, var(--blue), var(--sky));
      color: var(--white); padding: 14px 20px;
    }
    .progress-bar-bg {
      height: 10px; background: rgba(255,255,255,0.25);
      border-radius: 5px; margin-top: 8px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--gold);
      border-radius: 5px; transition: width 0.4s;
    }
    .quiz-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 20px 16px 32px; gap: 18px;
    }
    .quiz-question-row {
      display: flex; align-items: center; gap: 12px;
    }
    .btn-hear-question {
      flex-shrink: 0; min-width: 52px; height: 52px;
      border: none; border-radius: 26px; cursor: pointer;
      background: var(--sky); color: var(--white);
      font-size: 1.3rem; padding: 0 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(21,101,192,0.3);
    }
    .btn-hear-question:active { transform: scale(0.92); }
    .quiz-question-text {
      font-size: 1.2rem; font-weight: 700; color: var(--blue);
    }
    .quiz-flag {
      width: 220px; height: 150px; object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      border: 4px solid var(--white);
    }
    .quiz-country-label {
      font-size: 1.1rem; font-weight: 700; color: var(--blue);
    }
    .options-list {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .option-row {
      display: flex; gap: 10px; align-items: stretch;
    }
    .btn-hear-opt {
      flex-shrink: 0; width: 48px; min-height: 48px;
      border: none; border-radius: 12px; cursor: pointer;
      background: var(--sky); color: var(--white);
      font-size: 1.15rem;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-hear-opt:active { transform: scale(0.9); }
    .btn-option {
      flex: 1; min-height: 48px; padding: 10px 16px;
      font-size: 1.05rem; font-weight: 600;
      border: 3px solid #c5cae9; border-radius: 14px;
      background: var(--white); color: var(--blue);
      cursor: pointer; transition: all 0.2s;
      text-align: start;
    }
    .btn-option:active { transform: scale(0.97); }
    .btn-option.correct {
      border-color: var(--green); background: #e8f5e9; color: var(--green);
    }
    .btn-option.wrong {
      border-color: var(--red); background: #ffebee; color: var(--red);
    }
    .btn-option:disabled { cursor: default; opacity: 0.85; }

    .btn-next {
      margin-top: 10px;
      padding: 14px 40px; font-size: 1.15rem; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer;
      background: linear-gradient(135deg, var(--sky), #1e88e5);
      color: var(--white);
      box-shadow: 0 4px 16px rgba(21,101,192,0.35);
      transition: transform 0.15s;
      display: none;
    }
    .btn-next:active { transform: scale(0.95); }

    /* ════════════════════════════════
       RESULT SCREEN
    ════════════════════════════════ */
    #screen-result {
      background: linear-gradient(160deg, #1a237e 0%, #283593 55%, #1565c0 100%);
      align-items: center; justify-content: center;
      text-align: center; color: var(--white);
      padding: 32px 20px; gap: 18px;
    }
    .result-emoji { font-size: 64px; }
    .result-title { font-size: 1.8rem; font-weight: 900; }
    .result-score { font-size: 1.15rem; opacity: 0.9; }
    .result-chips {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
      margin: 8px 0;
    }
    .result-chip {
      width: 64px; height: 44px; border-radius: 10px;
      overflow: hidden; border: 3px solid;
      object-fit: cover;
    }
    .result-chip.ok { border-color: #66bb6a; }
    .result-chip.fail { border-color: #ef5350; opacity: 0.7; }
    .btn-hear-results {
      min-width: 200px; padding: 14px 28px;
      font-size: 1.2rem; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer;
      background: linear-gradient(135deg, var(--gold), #fbc02d);
      color: var(--blue);
      box-shadow: 0 4px 16px rgba(249,168,37,0.5);
    }
    .btn-hear-results:active { transform: scale(0.95); }
    .btn-continue {
      padding: 16px 44px; font-size: 1.2rem; font-weight: 800;
      border: none; border-radius: 50px; cursor: pointer;
      background: var(--white); color: var(--blue);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transition: transform 0.15s;
    }
    .btn-continue:active { transform: scale(0.95); }

<body>

  <!-- Voice warning banner -->
  <div id="voice-warning" class="voice-warning"></div>

  <!-- Screen 0: Language Picker -->
  <div id="screen-lang" class="screen active">

      <div class="lang-globe">🌍</div>
      <h1 class="lang-title">Choose Language / בחר שפה</h1>
      <div class="lang-buttons">
        <button class="btn-lang" onclick="chooseLang('he')">🇮🇱 עברית</button>
        <button class="btn-lang" onclick="chooseLang('en')">🇬🇧 English</button>
      </div>
    </div>
  </div>

  <!-- Screen 1: Welcome -->
  <div id="screen-welcome" class="screen">
    <div class="welcome-emoji">🌍</div>
    <h1 id="welcome-title" class="welcome-title"></h1>

    <button id="btn-start" class="btn-start" onclick="startGame()"></button>
    <button class="btn-change-lang" onclick="showScreen('screen-lang')"></button>
  </div>

  <!-- Screen 2: Study -->
  <div id="screen-study" class="screen">

      <h2 id="study-title"></h2>

  </div>

      <span id="quiz-progress-label"></span>

      </div>

  <!-- Screen 4: Results -->
  <div id="screen-result" class="screen">
    <div id="result-emoji" class="result-emoji"></div>
    <h1 id="result-title" class="result-title"></h1>
    <p id="result-score" class="result-score"></p>
    <div id="result-chips" class="result-chips"></div>
    <button id="btn-hear-results" class="btn-hear-results" onclick="speakResults(state.roundResults)"></button>
    <button id="btn-continue" class="btn-continue" onclick="continueGame()"></button>
  </div>

<script>
/* ════════════════════════════════
   VOICE / TTS
════════════════════════════════ */
let LANG = 'he';
let ttsVoiceHe = null;
let ttsVoiceEn = null;

function initVoices() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  ttsVoiceHe = voices.find(v => v.lang.startsWith('he')) ||
               voices.find(v => v.lang.startsWith('en')) ||
               voices[0];
  ttsVoiceEn = voices.find(v => v.lang.startsWith('en-US')) ||
               voices.find(v => v.lang.startsWith('en')) ||
               voices[0];
  checkHebrewVoice();
}
if (window.speechSynthesis) {
  window.speechSynthesis.addEventListener('voiceschanged', initVoices);
  initVoices();
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voice = LANG === 'he' ? ttsVoiceHe : ttsVoiceEn;
  if (voice) u.voice = voice;
  u.lang = LANG === 'he' ? 'he-IL' : 'en-US';
  u.rate = 0.85;
  u.pitch = 1.1;
  window.speechSynthesis.speak(u);
}

// Chrome keepalive for speechSynthesis
setInterval(() => {
  if (window.speechSynthesis && window.speechSynthesis.speaking) {
    window.speechSynthesis.pause();
    window.speechSynthesis.resume();
  }
}, 10000);

function checkHebrewVoice() {
  const warn = document.getElementById('voice-warning');
  if (LANG === 'he' && ttsVoiceHe && !ttsVoiceHe.lang.startsWith('he')) {
    warn.textContent = 'לא נמצא קול עברי במכשיר — ההשמעה תהיה באנגלית';
    warn.classList.add('show');
  } else {
    warn.classList.remove('show');
  }
}

/* ════════════════════════════════
   LANGUAGE + DIRECTION
════════════════════════════════ */
function ui(he, en) { return LANG === 'he' ? he : en; }
function t(country, field) {
  return LANG === 'he' ? country[field + 'He'] : country[field + 'En'];
}
function setLang(lang) {
  LANG = lang;
  document.documentElement.lang = lang === 'he' ? 'he' : 'en';
  document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
}

/* ════════════════════════════════
   NUMBER FORMATTING
════════════════════════════════ */
function formatNum(n) {
  if (LANG === 'he') return n.toLocaleString('he-IL');
  return n.toLocaleString('en-US');
}
function formatPop(n) {
  if (n >= 1_000_000_000) {
    const v = (n / 1_000_000_000).toFixed(1);
    return LANG === 'he' ? `${v} מיליארד` : `${v} billion`;
  }
  const v = Math.round(n / 1_000_000);
  return LANG === 'he' ? `${v} מיליון` : `${v} million`;
}

/* ════════════════════════════════
   HELPERS
════════════════════════════════ */
function flagUrl(code) {
  return `https://flagcdn.com/w320/${code}.png`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickDistractors(correct, pool, count, field) {
  const others = pool.filter(c => c.code !== correct.code);
  const shuffled = shuffle(others);
  return shuffled.slice(0, count);
}

/* ════════════════════════════════
   SPEAK HELPERS
════════════════════════════════ */
function speakFact(c, factType) {
  const name = t(c, 'name');
  const sentences = {
    name:      name,
    capital:   LANG === 'he' ? `בירת ${name} היא ${t(c,'capital')}` : `The capital of ${name} is ${t(c,'capital')}`,
    area:      LANG === 'he' ? `שטח ${name} הוא ${formatNum(c.area)} קילומטר רבוע` : `The area of ${name} is ${formatNum(c.area)} square kilometers`,
    pop:       LANG === 'he' ? `ב${name} גרים ${formatPop(c.pop)}` : `${name} has a population of ${formatPop(c.pop)}`,
    continent: LANG === 'he' ? `${name} נמצאת ביבשת ${t(c,'continent')}` : `${name} is in ${t(c,'continent')}`,
    language:  LANG === 'he' ? `ב${name} מדברים ${t(c,'language')}` : `In ${name} people speak ${t(c,'language')}`,
  };
  speak(sentences[factType]);
}

function speakResults(results) {
  const correct = results.filter(r => r.nameOk).length;
  const total = results.length;
  const text = LANG === 'he'
    ? `זיהית נכון ${correct} מתוך ${total} דגלים! ${correct === total ? 'מדהים!' : 'כל הכבוד!'}`
    : `You got ${correct} out of ${total} flags correct! ${correct === total ? 'Amazing!' : 'Well done!'}`;
  speak(text);
}

/* ════════════════════════════════
   GAME STATE
════════════════════════════════ */
const state = {
  deck: [],
  roundIndex: 0,
  batch: [],
  quizIndex: 0,
  quizPhase: 'name',
  roundResults: [],
  matchedPairs: 0,
};

/* ════════════════════════════════
   SCREEN NAVIGATION
════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function chooseLang(lang) {
  setLang(lang);
  checkHebrewVoice();
  renderWelcome();
  showScreen('screen-welcome');
}

/* ════════════════════════════════
   WELCOME SCREEN
════════════════════════════════ */
function renderWelcome() {
  document.getElementById('welcome-title').textContent = ui('משחק זכרון דגלים 🌍', 'Flags Memory Game 🌍');
  document.getElementById('welcome-sub').textContent = ui('נלמד דגלים של מדינות העולם', 'Learn flags of world countries');
  document.getElementById('btn-start').textContent = ui('בואו נשחק! 🎉', "Let's Play! 🎉");
  document.querySelector('.btn-change-lang').textContent = ui('🔄 שנה שפה', '🔄 Change Language');
}

/* ════════════════════════════════
   GAME LOGIC
════════════════════════════════ */
function startGame() {
  state.deck = shuffle(COUNTRIES);
  state.roundIndex = 0;
  state.matchedPairs = 0;
  nextRound();
}

function nextRound() {
  const start = state.roundIndex * 5;
  if (start >= state.deck.length) {
    // All done — restart
    state.deck = shuffle(COUNTRIES);
    state.roundIndex = 0;
  }
  state.batch = state.deck.slice(state.roundIndex * 5, state.roundIndex * 5 + 5);
  if (state.batch.length === 0) {
    state.deck = shuffle(COUNTRIES);
    state.roundIndex = 0;
    state.batch = state.deck.slice(0, 5);
  }
  state.roundResults = [];
  state.quizIndex = 0;
  state.quizPhase = 'name';
  renderStudyScreen();
  showScreen('screen-study');
}

/* ════════════════════════════════
   STUDY SCREEN
════════════════════════════════ */
function renderStudyScreen() {
  const totalRounds = Math.ceil(state.deck.length / 5);
  const currentRound = state.roundIndex + 1;

  document.getElementById('study-title').textContent = ui('📖 לומדים דגלים', '📖 Learning Flags');
  document.getElementById('study-round').textContent = ui(`סבב ${currentRound} מתוך ${totalRounds}`, `Round ${currentRound} of ${totalRounds}`);
  document.getElementById('btn-start-quiz').textContent = ui('יאללה, בואו נשחק! 🧠', "Let's Quiz! 🧠");

  const grid = document.getElementById('study-grid');
  grid.innerHTML = '';

  state.batch.forEach(c => {
    const name = t(c, 'name');
    const card = document.createElement('div');
    card.className = 'study-card';

    const facts = [
      { label: ui('בירה', 'Capital'),      value: t(c, 'capital'),    type: 'capital' },
      { label: ui('שטח', 'Area'),          value: formatNum(c.area) + ui(' קמ"ר', ' km²'), type: 'area' },
      { label: ui('אוכלוסייה', 'Population'), value: formatPop(c.pop), type: 'pop' },
      { label: ui('יבשת', 'Continent'),    value: t(c, 'continent'),  type: 'continent' },
      { label: ui('שפה', 'Language'),      value: t(c, 'language'),   type: 'language' },
    ];

    let factsHtml = facts.map(f => {
      const cJson = JSON.stringify(c).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
      return `
        <div class="fact-row">
          <span class="fact-label">${f.label}:</span>
          <span class="fact-value">${f.value}</span>
          <button class="btn-hear-fact" onclick="event.stopPropagation(); speakFact(COUNTRIES.find(x=>x.code==='${c.code}'), '${f.type}')">🔊</button>
        </div>
      `;
    }).join('');

    card.innerHTML = `
      <img class="study-card-flag" src="${flagUrl(c.code)}" alt="${name}" loading="lazy" />
      <div class="study-card-body">
        <div class="study-card-name">
          <span>${name}</span>
          <button class="btn-hear-name" onclick="event.stopPropagation(); speakFact(COUNTRIES.find(x=>x.code==='${c.code}'), 'name')">🔊</button>
        </div>
        ${factsHtml}
      </div>
    `;

    grid.appendChild(card);
  });
}

/* ════════════════════════════════
   QUIZ
════════════════════════════════ */
function startQuiz() {
  state.quizIndex = 0;
  state.quizPhase = 'name';
  state.roundResults = [];
  showScreen('screen-quiz');
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const total = state.batch.length;
  const current = state.quizIndex + 1;
  const pct = ((state.quizIndex) / total) * 100;

  document.getElementById('quiz-progress-label').textContent = ui(`שאלה ${current} מתוך ${total}`, `Question ${current} of ${total}`);
  document.getElementById('quiz-progress-fill').style.width = pct + '%';

  const c = state.batch[state.quizIndex];
  const body = document.getElementById('quiz-body');

  if (state.quizPhase === 'name') {
    renderNamePhase(c, body);
  } else {
    renderDetailPhase(c, body);
  }
}

function renderNamePhase(c, body) {
  const questionText = ui('איזו מדינה זו?', 'Which country is this?');
  const distractors = pickDistractors(c, COUNTRIES, 3);
  const options = shuffle([c, ...distractors]);

  let optionsHtml = options.map(opt => {
    const nameText = t(opt, 'name');
    const isCorrect = opt.code === c.code;
    const escapedName = nameText.replace(/'/g, "\\'");
    return `
      <div class="option-row">
        <button class="btn-hear-opt" onclick="event.stopPropagation(); speak('${escapedName}')">🔊</button>
        <button class="btn-option" data-code="${opt.code}" onclick="handleNameAnswer(this, ${isCorrect}, '${c.code}')">
          ${nameText}
        </button>
      </div>
    `;
  }).join('');

  const escapedQ = questionText.replace(/'/g, "\\'");
  body.innerHTML = `
    <div class="quiz-question-row">
      <button class="btn-hear-question" onclick="event.stopPropagation(); speak('${escapedQ}')">🔊</button>
      <span class="quiz-question-text">${questionText}</span>
    </div>
    <img class="quiz-flag" src="${flagUrl(c.code)}" alt="?" />
    <div class="options-list">${optionsHtml}</div>
    <button id="btn-next" class="btn-next" onclick="nextQuizStep()">${ui('הדגל הבא ➡️', 'Next Flag ➡️')}</button>
  `;
}

function renderDetailPhase(c, body) {
  const name = t(c, 'name');
  // Pick a random detail question
  const detailTypes = ['capital', 'continent', 'language'];
  const dtype = detailTypes[Math.floor(Math.random() * detailTypes.length)];

  let questionText, correctVal, optionValues;

  if (dtype === 'capital') {
    questionText = ui(`מה הבירה של ${name}?`, `What is the capital of ${name}?`);
    correctVal = t(c, 'capital');
    const others = shuffle(COUNTRIES.filter(x => x.code !== c.code && t(x, 'capital') !== correctVal));
    optionValues = shuffle([
      { text: correctVal, correct: true },
      ...others.slice(0, 3).map(x => ({ text: t(x, 'capital'), correct: false }))
    ]);
  } else if (dtype === 'continent') {
    questionText = ui(`באיזו יבשת נמצאת ${name}?`, `Which continent is ${name} in?`);
    correctVal = t(c, 'continent');
    const allContinents = [...new Set(COUNTRIES.map(x => t(x, 'continent')))].filter(v => v !== correctVal);
    const shuffledCont = shuffle(allContinents);
    optionValues = shuffle([
      { text: correctVal, correct: true },
      ...shuffledCont.slice(0, 3).map(v => ({ text: v, correct: false }))
    ]);
  } else {
    questionText = ui(`איזו שפה מדברים ב${name}?`, `What language is spoken in ${name}?`);
    correctVal = t(c, 'language');
    const others = shuffle(COUNTRIES.filter(x => x.code !== c.code && t(x, 'language') !== correctVal));
    optionValues = shuffle([
      { text: correctVal, correct: true },
      ...others.slice(0, 3).map(x => ({ text: t(x, 'language'), correct: false }))
    ]);
  }

  // Ensure exactly 4 options
  if (optionValues.length > 4) optionValues = optionValues.slice(0, 4);

  let optionsHtml = optionValues.map(opt => {
    const escapedText = opt.text.replace(/'/g, "\\'");
    return `
      <div class="option-row">
        <button class="btn-hear-opt" onclick="event.stopPropagation(); speak('${escapedText}')">🔊</button>
        <button class="btn-option" data-correct="${opt.correct}" onclick="handleDetailAnswer(this, ${opt.correct}, '${c.code}')">
          ${opt.text}
        </button>
      </div>
    `;
  }).join('');

  const escapedQ = questionText.replace(/'/g, "\\'");
  const isLast = state.quizIndex >= state.batch.length - 1;
  const nextLabel = isLast ? ui('לראות תוצאות 🏆', 'See Results 🏆') : ui('הדגל הבא ➡️', 'Next Flag ➡️');

  body.innerHTML = `
    <div class="quiz-question-row">
      <button class="btn-hear-question" onclick="event.stopPropagation(); speak('${escapedQ}')">🔊</button>
      <span class="quiz-question-text">${questionText}</span>
    </div>
    <img class="quiz-flag" src="${flagUrl(c.code)}" alt="${name}" />
    <div class="quiz-country-label">${name}</div>
    <div class="options-list">${optionsHtml}</div>
    <button id="btn-next" class="btn-next" onclick="nextQuizStep()">${nextLabel}</button>
  `;
}

function handleNameAnswer(btn, isCorrect, correctCode) {
  const allBtns = document.querySelectorAll('.btn-option');
  const allHearBtns = document.querySelectorAll('.btn-hear-opt');
  allBtns.forEach(b => b.disabled = true);
  allHearBtns.forEach(b => b.disabled = true);

  // Highlight correct and wrong
  allBtns.forEach(b => {
    const country = COUNTRIES.find(x => x.code === b.dataset.code);
    if (b.dataset.code === correctCode) {
      b.classList.add('correct');
    } else if (b === btn && !isCorrect) {
      b.classList.add('wrong');
    }
  });

  // Speak selected country name
  const selectedCountry = COUNTRIES.find(x => x.code === btn.dataset.code);
  if (selectedCountry) speak(t(selectedCountry, 'name'));

  // Record result
  if (!state.roundResults[state.quizIndex]) {
    state.roundResults[state.quizIndex] = { country: COUNTRIES.find(x => x.code === correctCode), nameOk: isCorrect, detailOk: false };
  } else {
    state.roundResults[state.quizIndex].nameOk = isCorrect;
  }

  document.getElementById('btn-next').style.display = 'inline-block';
}

function handleDetailAnswer(btn, isCorrect, correctCode) {
  const allBtns = document.querySelectorAll('.btn-option');
  const allHearBtns = document.querySelectorAll('.btn-hear-opt');
  allBtns.forEach(b => b.disabled = true);
  allHearBtns.forEach(b => b.disabled = true);

  allBtns.forEach(b => {
    if (b.dataset.correct === 'true') {
      b.classList.add('correct');
    } else if (b === btn && !isCorrect) {
      b.classList.add('wrong');
    }
  });

  // Speak selected option
  speak(btn.textContent.trim());

  // Record detail result
  if (!state.roundResults[state.quizIndex]) {
    state.roundResults[state.quizIndex] = { country: COUNTRIES.find(x => x.code === correctCode), nameOk: false, detailOk: isCorrect };
  } else {
    state.roundResults[state.quizIndex].detailOk = isCorrect;
  }

  document.getElementById('btn-next').style.display = 'inline-block';
}

function nextQuizStep() {
  if (state.quizPhase === 'name') {
    // Move to detail phase for same country
    state.quizPhase = 'detail';
    renderQuizQuestion();
  } else {
    // Move to next country or results
    state.quizIndex++;
    if (state.quizIndex >= state.batch.length) {
      showResults();
    } else {
      state.quizPhase = 'name';
      renderQuizQuestion();
    }
  }
}

/* ════════════════════════════════
   RESULTS SCREEN
════════════════════════════════ */
function showResults() {
  const correct = state.roundResults.filter(r => r.nameOk).length;
  const total = state.roundResults.length;
  const pct = correct / total;

  // Update progress bar to 100%
  document.getElementById('quiz-progress-fill').style.width = '100%';

  let emoji, title;
  if (pct === 1) {
    emoji = '🏆';
    title = ui('מושלם!', 'Perfect!');
  } else if (pct >= 0.6) {
    emoji = '🌟';
    title = ui('כל הכבוד!', 'Well Done!');
  } else {
    emoji = '💪';
    title = ui('נמשיך להתאמן!', 'Keep Practicing!');
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = ui(`${correct} מתוך ${total} נכון`, `${correct} out of ${total} correct`);

  // Chips
  const chipsEl = document.getElementById('result-chips');
  chipsEl.innerHTML = '';
  state.roundResults.forEach(r => {
    const img = document.createElement('img');
    img.src = flagUrl(r.country.code);
    img.className = 'result-chip ' + (r.nameOk ? 'ok' : 'fail');
    img.alt = t(r.country, 'name');
    chipsEl.appendChild(img);
  });

  // Hear results button
  document.getElementById('btn-hear-results').textContent = ui('🔊 שמע תוצאות', '🔊 Hear Results');

  // Continue button
  const hasMore = (state.roundIndex + 1) * 5 < state.deck.length;
  document.getElementById('btn-continue').textContent = hasMore
    ? ui('➡️ לחמשת הדגלים הבאים', '➡️ Next 5 Flags')
    : ui('🔄 שחקו שוב', '🔄 Play Again');

  showScreen('screen-result');
}

function continueGame() {
  const hasMore = (state.roundIndex + 1) * 5 < state.deck.length;
  if (hasMore) {
    state.roundIndex++;
    nextRound();
  } else {
    // Restart
    startGame();
  }
}
